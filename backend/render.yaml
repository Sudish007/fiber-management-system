services:
  - type: web
    name: fms-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./fiber_management.db
      - key: SECRET_KEY
        generateValue: true
